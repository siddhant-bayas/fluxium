name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[lint]"
      - name: Ruff lint
        run: ruff check fluxium/ tests/ benchmark/
      - name: Ruff format check
        run: ruff format --check fluxium/ tests/ benchmark/
      - name: Mypy
        run: mypy fluxium/ --ignore-missing-imports

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: pip install -e ".[test]"
      - name: Run unit tests
        run: pytest tests/test_comprehensive.py tests/test_extra.py tests/test_respx.py --cov=fluxium --cov-report=term-missing
